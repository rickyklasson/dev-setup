format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$character\
"""

[character]
format = ' $symbol '

[directory]
style = 'blue'

[git_branch]
style = 'green'

[git_status]
format = '$untracked$staged$modified'
modified = '[!$count](yellow)'
staged = '[+$count](green)'
untracked = '[?$count](purple)'
