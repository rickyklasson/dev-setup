# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 5

set -sa terminal-overrides ",xterm*:Tc"
set -g default-shell /usr/bin/zsh

unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

set -g pane-active-border-style 'fg=#b3c9e3'
set -g pane-border-style 'fg=#3e4b59'
set -g status-style 'bg=#ECEFF4 fg=#5E81AC'
set -g base-index 1
set -g mouse on

# Inactive window indicator.
set -g window-status-format "#[bg=#ECEFF4 fg=#4C566A] #{window_index} #[default]"
# Active window indicator.
set -g window-status-current-format "#[bg=#B3C9E3 fg=#2E3440] #{window_index} #[default]"

# Empty the left part of the bar.
set -g status-left ""

# Add time and date to the right.
set -g status-right "#[fg=#4C566A] #S #[fg=#4C566A] %H:%M:%S #[fg=#4C566A] %Y-%m-%d "

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching.
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# Plugins.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

set -g @resurrect-strategy-zsh 'session'

# Initialize tmux plugin manager (keep at bottom of this file).
run '~/.tmux/plugins/tpm/tpm'
